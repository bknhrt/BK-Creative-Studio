<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BK Creative Studio</title>
    <meta
      name="description"
      content="Cartão digital da BK Creative Studio."
    />

    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"

  <body>
    <div class="animated-bg" aria-hidden="true">
      <span></span>
      <span></span>

        <div class="brand-row">
          <span class="brand-dot" aria-hidden="true"></span>
          <span>@bkn.hrt_pt2</span>

        <div class="services">
          <h3>Serviços</h3>

          <div class="service-line">
            <i class="fa-solid fa-video"></i>

          <div class="service-line">
            <i class="fa-solid fa-camera"></i>
            <span>Tratamento de Imagens</span>

          <div class="service-line">
            <i class="fa-solid fa-palette"></i>

          <div class="service-line">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Motion Graphics</span>
          </div>

        <nav class="link-list" aria-label="Links principais">
          <a
            class="link-button primary"
            href="https://www.instagram.com/bkn.hrt_pt2/"
            target="_blank"
            rel="noreferrer"
          >
            <i class="fa-brands fa-instagram"></i>
            <span>Instagram</span>
          </a>

          <a
            class="link-button"
            href="https://wa.me/5500000000000"
            target="_blank"
            rel="noreferrer"
          >
            <i class="fa-brands fa-whatsapp"></i>

          <a class="link-button portfolio-offline" href="#">
            <i class="fa-solid fa-file-circle-xmark"></i>
